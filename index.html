<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호르메 몬테소리 부모교육 | 3기 신청</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
      background: #f5f1ed;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrap {
      background: #fff;
      max-width: 480px;
      width: 100%;
      border-radius: 8px;
      padding: 48px 32px 52px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #8B1A1A;
      background: #fdf3f3;
      border: 1px solid #e8c8c8;
      border-radius: 20px;
      padding: 5px 14px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.4;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .schedule-info {
      background: #faf6f2;
      border-radius: 6px;
      padding: 16px 18px;
      margin-bottom: 28px;
      text-align: left;
    }
    .schedule-row {
      display: flex;
      gap: 10px;
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .schedule-row:last-child { margin-bottom: 0; }
    .schedule-label {
      font-weight: 800;
      color: #8B1A1A;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .schedule-desc { color: #444; }

    .question {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .course-btn {
      display: block;
      text-decoration: none;
      padding: 20px;
      border-radius: 6px;
      border: 2px solid transparent;
      transition: all 0.15s;
      text-align: left;
    }

    .course-btn.basic {
      background: #8B1A1A;
      color: #fff;
    }
    .course-btn.basic:hover { background: #6e1414; }

    .course-btn.sensory {
      background: #fff;
      border-color: #8B1A1A;
      color: #8B1A1A;
    }
    .course-btn.sensory:hover { background: #fdf3f3; }

    .course-btn .btn-title {
      font-size: 17px;
      font-weight: 800;
      display: block;
      margin-bottom: 3px;
      letter-spacing: -0.3px;
    }
    .course-btn .btn-desc {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.8;
      display: block;
    }
    .course-btn .arrow {
      float: right;
      font-size: 18px;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">3기 모집</div>
    <h1>호르메 몬테소리<br>부모교육</h1>
    <p class="subtitle">줌(ZOOM) 소그룹 공동구매 수업</p>

    <div class="schedule-info">
      <div class="schedule-row">
        <span class="schedule-label">기본교육</span>
        <span class="schedule-desc">7/23(목)부터 매주 목요일 밤 9시 · 총 4회차</span>
      </div>
      <div class="schedule-row">
        <span class="schedule-label">감각교육</span>
        <span class="schedule-desc">7/24(금)부터 매주 금요일 밤 9시 · 총 4회차</span>
      </div>
    </div>

    <p class="question">어떤 교육을 신청하시겠어요?</p>

    <div class="btn-group">
      <a href="basic.html" class="course-btn basic" id="btn-basic">
        <span class="arrow">→</span>
        <span class="btn-title">기본교육 신청하기</span>
        <span class="btn-desc">목요일 밤 9시 · 7/23 시작</span>
      </a>
      <a class="course-btn sensory" id="btn-sensory" style="cursor:default;opacity:0.55;">
        <span class="arrow">✕</span>
        <span class="btn-title">감각교육 — 마감되었습니다</span>
        <span class="btn-desc">신청이 마감되었습니다. 다음 기수를 기대해 주세요.</span>
      </a>
    </div>
  </div>
</body>
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXFtHC26Ak7YaiK1wl51SYZIgzQ7qYI6lanQtnYK3hrKdedfy5po0vqTz4ozteqHe0/exec';

  function closeCourseBtn(btn, label) {
    btn.removeAttribute('href');
    btn.style.cursor = 'default';
    btn.style.opacity = '0.55';
    btn.querySelector('.btn-title').textContent = label + ' — 마감되었습니다';
    btn.querySelector('.btn-desc').textContent  = '신청이 마감되었습니다. 다음 기수를 기대해 주세요.';
    btn.querySelector('.arrow').textContent = '✕';
  }

  // 기본교육 입금 카운트 확인
  fetch(SCRIPT_URL)
    .then(r => r.json())
    .then(d => {
      if (d.basic.closed) closeCourseBtn(document.getElementById('btn-basic'), '기본교육');
    })
    .catch(() => {});
</script>
</html>
